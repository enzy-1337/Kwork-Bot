services:
  bot:
    build: .
    container_name: kwork-monitor-bot
    entrypoint: ["/app/scripts/bot-entrypoint.sh"]
    command: ["python", "main.py"]
    env_file:
      - .env
    environment:
      BOT_PROXYCHAINS_ENABLED: ${BOT_PROXYCHAINS_ENABLED:-true}
      PROXYCHAINS_SOCKS5_HOST: ${PROXYCHAINS_SOCKS5_HOST:-host.docker.internal}
      PROXYCHAINS_SOCKS5_PORT: ${PROXYCHAINS_SOCKS5_PORT:-1080}
      PROXYCHAINS_PROXY_DNS: ${PROXYCHAINS_PROXY_DNS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: kwork-monitor-db
    environment:
      POSTGRES_DB: kwork_bot
      POSTGRES_USER: kwork
      POSTGRES_PASSWORD: kwork
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: kwork-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
